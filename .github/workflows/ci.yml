name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Debug)
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain info
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve build settings
        run: |
          xcodebuild -project portman.xcodeproj \
            -scheme portman \
            -showBuildSettings \
            -configuration Debug \
            | grep -E '^(\s+)(MACOSX_DEPLOYMENT_TARGET|PRODUCT_BUNDLE_IDENTIFIER|SWIFT_VERSION) ' || true

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project portman.xcodeproj \
            -scheme portman \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Smoke check the built app
        run: |
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -name 'portman.app' -type d -path '*/Build/Products/Debug/*' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not locate built portman.app"
            exit 1
          fi
          echo "App at: $APP_PATH"
          test -x "$APP_PATH/Contents/MacOS/portman"
          plutil -lint "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :LSUIElement" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Contents/Info.plist"
